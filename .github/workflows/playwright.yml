name: Playwright Sum

on:
  push:
  workflow_dispatch:

jobs:
  sum-tables:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./playwright-sum

      - name: Install Playwright Browsers
        run: npx playwright install
        working-directory: ./playwright-sum

      - name: Run script 23f2003724@ds.study.iitm.ac.in
        run: node index.js
        working-directory: ./playwright-sum